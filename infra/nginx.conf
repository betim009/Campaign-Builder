# Campaign Builder — Nginx (novo server block, não alterar o do Bikkoo)
#
# - Frontend estático: :80/:443
# - Proxy API: :8081 -> backend (Docker) :3001
#
# Ajuste `server_name` e caminhos conforme o ambiente.

server {
  listen 8081;
  listen [::]:8081;

  server_name _;

  client_max_body_size 25m;

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  listen [::]:80;

  server_name dominio.com www.dominio.com;

  root /var/www/campaign-builder/frontend/dist;
  index index.html;

  # SPA (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Opcional: permitir uploads servidos pelo backend (sem expor token)
  location /uploads/ {
    proxy_pass http://127.0.0.1:3001/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
